server:
  port: 8083

spring:
  application:
    name: transaction-service

  cloud:
    compatibility-verifier:
      enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transaction_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: transaction-service

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        # Number of calls in the sliding window (COUNT_BASED)
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        # Circuit opens when failure rate exceeds 50%
        failure-rate-threshold: 50
        # After 10s in OPEN state, transition to HALF-OPEN
        wait-duration-in-open-state: 10s
        # Number of probe calls allowed in HALF-OPEN state
        permitted-number-of-calls-in-half-open-state: 3
        # Calls slower than 2s are counted as slow calls
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50
        # Expose circuit state on the Actuator /health endpoint
        register-health-indicator: true
        # 4xx errors are business logic failures — should not trip the circuit
        ignore-exceptions:
          - feign.FeignException$BadRequest
          - feign.FeignException$NotFound

account-service:
  url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}

logging:
  level:
    com.banking.transactionservice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [transaction-service] [%thread] %-5level %logger{36} - %msg%n"
