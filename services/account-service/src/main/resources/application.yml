server:
  port: 8082

spring:
  application:
    name: account-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/account_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: account-service

logging:
  level:
    com.banking.accountservice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [account-service] [%thread] %-5level %logger{36} - %msg%n"
